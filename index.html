<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maygrove — iOS Onboarding & Home Prototype</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f4f2ee; font-family: 'DM Sans', -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    /**
     * IosFrame — iPhone 15 Pro mockup (393×852 logical)
     * Copied from huashu-design/assets/ios_frame.jsx
     */
    const iosFrameStyles = {
      wrapper: {
        display: 'inline-block', padding: 12, background: '#000', borderRadius: 60,
        boxShadow: '0 0 0 2px #1f2937, 0 20px 60px rgba(0,0,0,0.3)',
        position: 'relative',
      },
      screen: {
        position: 'relative', borderRadius: 48, overflow: 'hidden', background: '#FDFBF7',
      },
      statusBar: {
        position: 'absolute', top: 0, left: 0, right: 0, height: 54,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 32px 0 32px', fontSize: 16, fontWeight: 600,
        fontFamily: '-apple-system, "SF Pro Text", sans-serif', zIndex: 20, pointerEvents: 'none',
      },
      dynamicIsland: {
        position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)',
        width: 124, height: 36, background: '#000', borderRadius: 999, zIndex: 30,
      },
      statusIcons: { display: 'flex', alignItems: 'center', gap: 6 },
      signalIcon: { display: 'flex', alignItems: 'flex-end', gap: 2, height: 12 },
      signalBar: { width: 3, background: 'currentColor', borderRadius: 1 },
      batteryIcon: {
        width: 26, height: 12, border: '1.5px solid currentColor', borderRadius: 3,
        padding: 1, position: 'relative', opacity: 0.8,
      },
      batteryCap: {
        position: 'absolute', top: 3, right: -3, width: 2, height: 6,
        background: 'currentColor', borderRadius: '0 1px 1px 0',
      },
      content: { position: 'absolute', top: 54, left: 0, right: 0, bottom: 34, overflow: 'auto' },
      homeIndicator: {
        position: 'absolute', bottom: 10, left: '50%', transform: 'translateX(-50%)',
        width: 140, height: 5, background: 'rgba(0,0,0,0.3)', borderRadius: 999, zIndex: 10,
      },
    };

    function IosFrame({ children, width = 393, height = 852, time = '9:41', battery = 100, darkMode = false }) {
      const textColor = darkMode ? '#fff' : '#000';
      return (
        <div style={iosFrameStyles.wrapper}>
          <div style={{ ...iosFrameStyles.screen, width, height, background: darkMode ? '#000' : '#FDFBF7' }}>
            <div style={{ ...iosFrameStyles.statusBar, color: textColor }}>
              <span>{time}</span>
              <div style={iosFrameStyles.statusIcons}>
                <div style={iosFrameStyles.signalIcon}>
                  {[4, 6, 9, 11].map((h, i) => <div key={i} style={{ ...iosFrameStyles.signalBar, height: h }} />)}
                </div>
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style={{ color: textColor }}>
                  <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="currentColor" />
                  <path d="M3 7.5a7 7 0 0110 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" />
                  <path d="M1 4.5a11 11 0 0114 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" opacity="0.7" />
                </svg>
                <div style={iosFrameStyles.batteryIcon}>
                  <div style={{ width: `${battery}%`, height: '100%', background: 'currentColor', borderRadius: 1, opacity: 0.9 }} />
                  <div style={iosFrameStyles.batteryCap} />
                </div>
              </div>
            </div>
            <div style={iosFrameStyles.dynamicIsland} />
            <div style={iosFrameStyles.content}>{children}</div>
            <div style={{ ...iosFrameStyles.homeIndicator, background: darkMode ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.3)' }} />
          </div>
        </div>
      );
    }

    // Design tokens
    const tokens = {
      bg: '#FDFBF7',
      sage: '#6E7D65',
      sageLight: '#E8ECE3',
      clay: '#B8735F',
      clayLight: '#F3E6E0',
      ink: '#1A1A1A',
      inkMuted: '#6E6E6E',
      cream: '#F4F2EE',
      white: '#FFFFFF',
      fontDisplay: '"Playfair Display", serif',
      fontBody: '"DM Sans", sans-serif',
    };

    // Shared components
    function Button({ children, variant = 'primary', onClick, style }) {
      const base = { padding: '16px 24px', borderRadius: 16, fontWeight: 700, fontSize: 16, border: 'none', cursor: 'pointer', width: '100%' };
      const variants = {
        primary: { background: tokens.sage, color: '#fff' },
        secondary: { background: tokens.clayLight, color: tokens.clay },
        outline: { background: 'transparent', color: tokens.sage, border: `1.5px solid ${tokens.sage}` },
      };
      return <button onClick={onClick} style={{ ...base, ...variants[variant], ...style }}>{children}</button>;
    }

    function SeedPod({ color, name, days, small }) {
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, background: tokens.white, borderRadius: 18, padding: small ? '12px' : '14px', boxShadow: '0 1px 3px rgba(0,0,0,0.04)' }}>
          <div style={{ width: small ? 40 : 52, height: small ? 40 : 52, borderRadius: 14, background: color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>🌱</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 700, fontSize: 15, color: tokens.ink }}>{name}</div>
            <div style={{ fontSize: 13, color: tokens.inkMuted, marginTop: 2 }}>{days} days to harvest</div>
          </div>
        </div>
      );
    }

    function StatusCard({ icon, label, value, sub, color }) {
      return (
        <div style={{ background: tokens.white, borderRadius: 20, padding: 16, flex: 1, boxShadow: '0 1px 3px rgba(0,0,0,0.04)' }}>
          <div style={{ fontSize: 24, marginBottom: 8 }}>{icon}</div>
          <div style={{ fontSize: 13, color: tokens.inkMuted, fontWeight: 500 }}>{label}</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: tokens.ink, marginTop: 4 }}>{value}</div>
          <div style={{ fontSize: 12, color: color || tokens.sage, marginTop: 4 }}>{sub}</div>
        </div>
      );
    }

    // Screen: Onboarding
    function OnboardingScreen({ onNext }) {
      const [step, setStep] = React.useState(0);
      const steps = [
        { title: 'Fresh food, grown by you', body: 'No soil. No green thumb needed. Just pure, living greens on your countertop.', visual: '🥬' },
        { title: 'Let Maygrove do the work', body: 'Smart light, water, and nutrients run on autopilot. You just add seeds.', visual: '✨' },
        { title: 'Harvest in about 30 days', body: 'From seed to salad. Track every stage in the app.', visual: '🌿' },
      ];
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '32px 24px 24px', background: tokens.bg }}>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', textAlign: 'center' }}>
            <div style={{ width: 220, height: 220, borderRadius: '50%', background: tokens.sageLight, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 96, marginBottom: 32 }}>
              {steps[step].visual}
            </div>
            <h1 style={{ fontFamily: tokens.fontDisplay, fontSize: 32, color: tokens.ink, margin: 0, lineHeight: 1.15 }}>{steps[step].title}</h1>
            <p style={{ fontSize: 16, color: tokens.inkMuted, marginTop: 16, lineHeight: 1.5 }}>{steps[step].body}</p>
          </div>
          <div style={{ display: 'flex', justifyContent: 'center', gap: 8, marginBottom: 24 }}>
            {steps.map((_, i) => <div key={i} style={{ width: 8, height: 8, borderRadius: 4, background: i === step ? tokens.sage : '#D8D4CC' }} />)}
          </div>
          <Button onClick={() => step < steps.length - 1 ? setStep(step + 1) : onNext()}>Continue</Button>
        </div>
      );
    }

    // Screen: Setup (Wi-Fi + pod selection)
    function SetupScreen({ onNext }) {
      const [selected, setSelected] = React.useState('butter');
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '24px', background: tokens.bg }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: tokens.sage, textTransform: 'uppercase', letterSpacing: 1 }}>Setup</div>
          <h2 style={{ fontFamily: tokens.fontDisplay, fontSize: 28, color: tokens.ink, margin: '12px 0 0' }}>Your first garden</h2>
          <p style={{ fontSize: 15, color: tokens.inkMuted, marginTop: 8, lineHeight: 1.5 }}>Connect your Maygrove and pick a beginner-friendly pod.</p>

          <div style={{ background: tokens.white, borderRadius: 20, padding: 18, marginTop: 24, boxShadow: '0 1px 3px rgba(0,0,0,0.04)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ width: 44, height: 44, borderRadius: 12, background: tokens.sageLight, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>📶</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 15, color: tokens.ink }}>Maygrove-7A2B</div>
                <div style={{ fontSize: 13, color: tokens.sage }}>Connected</div>
              </div>
            </div>
          </div>

          <div style={{ fontSize: 13, fontWeight: 700, color: tokens.inkMuted, textTransform: 'uppercase', letterSpacing: 1, marginTop: 28 }}>Recommended for beginners</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 12 }}>
            {[
              { id: 'butter', name: 'Butter Lettuce', days: '28', color: '#D4E6C3' },
              { id: 'basil', name: 'Sweet Basil', days: '25', color: '#E8ECE3' },
              { id: 'arugula', name: 'Arugula', days: '22', color: '#DDE4D5' },
            ].map((pod) => (
              <div key={pod.id} onClick={() => setSelected(pod.id)} style={{ cursor: 'pointer', border: selected === pod.id ? `2px solid ${tokens.sage}` : '2px solid transparent', borderRadius: 18 }}>
                <SeedPod color={pod.color} name={pod.name} days={pod.days} />
              </div>
            ))}
          </div>

          <div style={{ marginTop: 'auto', paddingTop: 16 }}>
            <Button onClick={onNext}>Start Growing</Button>
          </div>
        </div>
      );
    }

    // Screen: Home Dashboard
    function HomeScreen({ onTab }) {
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: tokens.bg }}>
          <div style={{ padding: '24px 24px 0' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div>
                <div style={{ fontSize: 13, color: tokens.inkMuted }}>Good morning</div>
                <div style={{ fontFamily: tokens.fontDisplay, fontSize: 26, color: tokens.ink, marginTop: 2 }}>Sarah's Garden</div>
              </div>
              <div style={{ width: 44, height: 44, borderRadius: 22, background: tokens.clayLight, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>👩🏻</div>
            </div>

            <div style={{ background: tokens.sage, borderRadius: 24, padding: 24, marginTop: 20, color: '#fff' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div>
                  <div style={{ fontSize: 13, opacity: 0.85, fontWeight: 500 }}>Butter Lettuce</div>
                  <div style={{ fontSize: 22, fontWeight: 700, marginTop: 4 }}>Day 14 of 28</div>
                </div>
                <div style={{ fontSize: 36 }}>🥬</div>
              </div>
              <div style={{ width: '100%', height: 6, background: 'rgba(255,255,255,0.25)', borderRadius: 3, marginTop: 20 }}>
                <div style={{ width: '50%', height: 6, background: '#fff', borderRadius: 3 }} />
              </div>
              <div style={{ fontSize: 13, opacity: 0.85, marginTop: 12 }}>Estimated harvest: July 29</div>
            </div>
          </div>

          <div style={{ padding: '0 24px', marginTop: 20 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: tokens.inkMuted, textTransform: 'uppercase', letterSpacing: 1 }}>Today</div>
              <div style={{ fontSize: 13, color: tokens.sage, fontWeight: 700 }}>All good</div>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <StatusCard icon="💧" label="Water" value="Good" sub="Refill in 5 days" color={tokens.sage} />
              <StatusCard icon="☀️" label="Light" value="16 hrs" sub="Auto schedule" color={tokens.sage} />
            </div>
            <div style={{ display: 'flex', gap: 10, marginTop: 10 }}>
              <StatusCard icon="🌡️" label="Temp" value="72°F" sub="Within range" color={tokens.sage} />
              <StatusCard icon="🧪" label="Nutrients" value="Good" sub="Lasts 3 weeks" color={tokens.sage} />
            </div>
          </div>

          <div style={{ marginTop: 'auto' }}>
            <TabBar active="home" onTab={onTab} />
          </div>
        </div>
      );
    }

    // Screen: AI Ask
    function AIScreen({ onTab }) {
      const [messages, setMessages] = React.useState([
        { role: 'ai', text: 'Hi Sarah! I noticed your Butter Lettuce is on Day 14. Anything you want to know?' },
      ]);
      const [input, setInput] = React.useState('');
      const send = () => {
        if (!input.trim()) return;
        setMessages([...messages, { role: 'user', text: input }, { role: 'ai', text: 'Your lettuce looks healthy. Keep the light on 16 hours and check water in 5 days.' }]);
        setInput('');
      };
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: tokens.bg }}>
          <div style={{ padding: '24px 24px 0' }}>
            <div style={{ fontFamily: tokens.fontDisplay, fontSize: 28, color: tokens.ink }}>Ask Maygrove</div>
            <p style={{ fontSize: 15, color: tokens.inkMuted, marginTop: 6 }}>AI-powered growing assistant</p>
          </div>
          <div style={{ flex: 1, overflow: 'auto', padding: 24, display: 'flex', flexDirection: 'column', gap: 12 }}>
            {messages.map((m, i) => (
              <div key={i} style={{ alignSelf: m.role === 'user' ? 'flex-end' : 'flex-start', maxWidth: '80%', background: m.role === 'user' ? tokens.sage : tokens.white, color: m.role === 'user' ? '#fff' : tokens.ink, padding: 14, borderRadius: 18, borderBottomLeftRadius: m.role === 'user' ? 18 : 4, borderBottomRightRadius: m.role === 'user' ? 4 : 18, fontSize: 15, lineHeight: 1.4, boxShadow: '0 1px 3px rgba(0,0,0,0.04)' }}>
                {m.text}
              </div>
            ))}
          </div>
          <div style={{ padding: '12px 24px 8px', background: tokens.white }}>
            <div style={{ display: 'flex', gap: 8, background: tokens.cream, borderRadius: 16, padding: 4 }}>
              <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && send()} placeholder="Ask anything..." style={{ flex: 1, border: 'none', background: 'transparent', padding: '12px 16px', fontSize: 15, outline: 'none' }} />
              <button onClick={send} style={{ width: 40, height: 40, borderRadius: 12, background: tokens.sage, color: '#fff', border: 'none', fontSize: 18, cursor: 'pointer' }}>➤</button>
            </div>
            <div style={{ display: 'flex', gap: 8, marginTop: 10, overflowX: 'auto', paddingBottom: 4 }}>
              {['Why are my leaves yellow?', 'When to harvest?', 'Best herbs for summer'].map((q) => (
                <button key={q} onClick={() => setInput(q)} style={{ whiteSpace: 'nowrap', border: 'none', background: tokens.sageLight, color: tokens.sage, padding: '8px 14px', borderRadius: 999, fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>{q}</button>
              ))}
            </div>
          </div>
          <TabBar active="ai" onTab={onTab} />
        </div>
      );
    }

    // Screen: Shop
    function ShopScreen({ onTab }) {
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: tokens.bg }}>
          <div style={{ padding: '24px 24px 0' }}>
            <div style={{ fontFamily: tokens.fontDisplay, fontSize: 28, color: tokens.ink }}>Seed Shop</div>
            <div style={{ display: 'flex', gap: 10, marginTop: 16, overflowX: 'auto' }}>
              {['All', 'Lettuces', 'Herbs', 'Microgreens', 'Tomatoes'].map((c, i) => (
                <button key={c} style={{ whiteSpace: 'nowrap', border: 'none', background: i === 0 ? tokens.sage : tokens.white, color: i === 0 ? '#fff' : tokens.ink, padding: '10px 18px', borderRadius: 999, fontSize: 13, fontWeight: 700, cursor: 'pointer', boxShadow: i === 0 ? 'none' : '0 1px 3px rgba(0,0,0,0.04)' }}>{c}</button>
              ))}
            </div>
          </div>
          <div style={{ flex: 1, overflow: 'auto', padding: 24 }}>
            <div style={{ background: tokens.clayLight, borderRadius: 20, padding: 20, marginBottom: 20 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: tokens.clay, textTransform: 'uppercase', letterSpacing: 1 }}>Member price</div>
              <div style={{ fontFamily: tokens.fontDisplay, fontSize: 22, color: tokens.ink, marginTop: 6 }}>$2 per pod — free shipping</div>
              <div style={{ fontSize: 14, color: tokens.inkMuted, marginTop: 4 }}>Next box ships in 12 days</div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {[
                { name: 'Butter Lettuce', price: '$2', tag: 'Member' },
                { name: 'Sweet Basil', price: '$2', tag: 'Member' },
                { name: 'Cherry Tomato', price: '$3', tag: 'Popular' },
                { name: 'Arugula', price: '$2', tag: 'Member' },
              ].map((p) => (
                <div key={p.name} style={{ display: 'flex', alignItems: 'center', gap: 14, background: tokens.white, borderRadius: 18, padding: 14, boxShadow: '0 1px 3px rgba(0,0,0,0.04)' }}>
                  <div style={{ width: 52, height: 52, borderRadius: 14, background: tokens.sageLight, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24 }}>🌱</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 15, color: tokens.ink }}>{p.name}</div>
                    <div style={{ fontSize: 13, color: tokens.inkMuted }}>Fits Maygrove One</div>
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <div style={{ fontWeight: 700, color: tokens.sage }}>{p.price}</div>
                    <div style={{ fontSize: 11, color: tokens.clay, fontWeight: 700 }}>{p.tag}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <TabBar active="shop" onTab={onTab} />
        </div>
      );
    }

    // Screen: Community
    function CommunityScreen({ onTab }) {
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: tokens.bg }}>
          <div style={{ padding: '24px 24px 0' }}>
            <div style={{ fontFamily: tokens.fontDisplay, fontSize: 28, color: tokens.ink }}>Community</div>
            <div style={{ display: 'flex', gap: 10, marginTop: 16, overflowX: 'auto' }}>
              {['For You', 'Following', 'Harvests', 'Tips'].map((c, i) => (
                <button key={c} style={{ whiteSpace: 'nowrap', border: 'none', background: i === 0 ? tokens.sage : tokens.white, color: i === 0 ? '#fff' : tokens.ink, padding: '10px 18px', borderRadius: 999, fontSize: 13, fontWeight: 700, cursor: 'pointer', boxShadow: i === 0 ? 'none' : '0 1px 3px rgba(0,0,0,0.04)' }}>{c}</button>
              ))}
            </div>
          </div>
          <div style={{ flex: 1, overflow: 'auto', padding: 24 }}>
            {[
              { user: 'Emily R.', avatar: '👩🏼', title: 'First harvest with my kids!', likes: 128 },
              { user: 'Rachel Design', avatar: '👩🏻‍🎨', title: 'Sage green looks perfect in my kitchen', likes: 245 },
              { user: 'Urban Grower', avatar: '👨🏽', title: 'Basil pruning tips for beginners', likes: 89 },
            ].map((post) => (
              <div key={post.title} style={{ background: tokens.white, borderRadius: 20, padding: 16, marginBottom: 14, boxShadow: '0 1px 3px rgba(0,0,0,0.04)' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
                  <div style={{ width: 36, height: 36, borderRadius: 18, background: tokens.cream, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>{post.avatar}</div>
                  <div style={{ fontWeight: 700, fontSize: 14, color: tokens.ink }}>{post.user}</div>
                </div>
                <div style={{ height: 160, borderRadius: 14, background: tokens.sageLight, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 64 }}>🌿</div>
                <div style={{ fontWeight: 700, fontSize: 15, color: tokens.ink, marginTop: 12 }}>{post.title}</div>
                <div style={{ display: 'flex', gap: 16, marginTop: 10, fontSize: 13, color: tokens.inkMuted }}>
                  <span>❤️ {post.likes}</span>
                  <span>💬 12</span>
                  <span>🔗 Share</span>
                </div>
              </div>
            ))}
          </div>
          <TabBar active="community" onTab={onTab} />
        </div>
      );
    }

    // Screen: Membership
    function MemberScreen({ onTab }) {
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: tokens.bg }}>
          <div style={{ padding: '24px 24px 0' }}>
            <div style={{ fontFamily: tokens.fontDisplay, fontSize: 28, color: tokens.ink }}>Membership</div>
          </div>
          <div style={{ flex: 1, overflow: 'auto', padding: 24 }}>
            <div style={{ background: 'linear-gradient(135deg, #6E7D65 0%, #8A9A7D 100%)', borderRadius: 24, padding: 24, color: '#fff' }}>
              <div style={{ fontSize: 13, opacity: 0.85, fontWeight: 500 }}>Maygrove Member</div>
              <div style={{ fontSize: 26, fontWeight: 700, marginTop: 4 }}>Sarah</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 20 }}>
                <div><div style={{ fontSize: 22, fontWeight: 700 }}>$86</div><div style={{ fontSize: 12, opacity: 0.8 }}>Saved this year</div></div>
                <div><div style={{ fontSize: 22, fontWeight: 700 }}>24</div><div style={{ fontSize: 12, opacity: 0.8 }}>Pods shipped</div></div>
                <div><div style={{ fontSize: 22, fontWeight: 700 }}>12</div><div style={{ fontSize: 12, opacity: 0.8 }}>Free delivers</div></div>
              </div>
            </div>
            <div style={{ marginTop: 24 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: tokens.inkMuted, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Your benefits</div>
              {[
                { icon: '🌱', label: '$2 member pods (save $1 each)', sub: 'Already saved $24' },
                { icon: '🚚', label: 'Free shipping on every order', sub: 'No minimum' },
                { icon: '🎓', label: 'Member-only growing classes', sub: 'New class every month' },
                { icon: '💬', label: 'Priority AI chat support', sub: 'Unlimited questions' },
              ].map((b) => (
                <div key={b.label} style={{ display: 'flex', alignItems: 'center', gap: 14, background: tokens.white, borderRadius: 18, padding: 16, marginBottom: 10, boxShadow: '0 1px 3px rgba(0,0,0,0.04)' }}>
                  <div style={{ fontSize: 24 }}>{b.icon}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 15, color: tokens.ink }}>{b.label}</div>
                    <div style={{ fontSize: 13, color: tokens.inkMuted, marginTop: 2 }}>{b.sub}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <TabBar active="member" onTab={onTab} />
        </div>
      );
    }

    function TabBar({ active, onTab }) {
      const items = [
        { id: 'home', icon: '🌿', label: 'Home' },
        { id: 'ai', icon: '✨', label: 'Ask' },
        { id: 'shop', icon: '🛒', label: 'Shop' },
        { id: 'community', icon: '👥', label: 'Community' },
        { id: 'member', icon: '👑', label: 'Member' },
      ];
      return (
        <div style={{ display: 'flex', justifyContent: 'space-around', alignItems: 'center', padding: '10px 0 22px', background: tokens.white, borderTop: '1px solid rgba(0,0,0,0.05)' }}>
          {items.map((item) => (
            <button key={item.id} onClick={() => onTab(item.id)} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, border: 'none', background: 'transparent', cursor: 'pointer' }}>
              <div style={{ fontSize: 22, opacity: active === item.id ? 1 : 0.5 }}>{item.icon}</div>
              <div style={{ fontSize: 10, fontWeight: 700, color: active === item.id ? tokens.sage : tokens.inkMuted }}>{item.label}</div>
            </button>
          ))}
        </div>
      );
    }

    function AppPhone({ initial }) {
      const [screen, setScreen] = React.useState(initial);
      const renderScreen = () => {
        switch (screen) {
          case 'onboarding': return <OnboardingScreen onNext={() => setScreen('setup')} />;
          case 'setup': return <SetupScreen onNext={() => setScreen('home')} />;
          case 'home': return <HomeScreen onTab={setScreen} />;
          case 'ai': return <AIScreen onTab={setScreen} />;
          case 'shop': return <ShopScreen onTab={setScreen} />;
          case 'community': return <CommunityScreen onTab={setScreen} />;
          case 'member': return <MemberScreen onTab={setScreen} />;
          default: return <HomeScreen onTab={setScreen} />;
        }
      };
      return <IosFrame>{renderScreen()}</IosFrame>;
    }

    function App() {
      const mainScreens = [
        { id: 'onboarding', label: 'Onboarding' },
        { id: 'setup', label: 'Setup' },
        { id: 'home', label: 'Home' },
        { id: 'ai', label: 'AI Ask' },
        { id: 'shop', label: 'Seed Shop' },
        { id: 'community', label: 'Community' },
        { id: 'member', label: 'Membership' },
      ];
      return (
        <div style={{ padding: 48, display: 'flex', flexDirection: 'column', alignItems: 'center', minHeight: '100vh' }}>
          <div style={{ textAlign: 'center', marginBottom: 40 }}>
            <h1 style={{ fontFamily: tokens.fontDisplay, fontSize: 42, color: tokens.ink, margin: 0 }}>Maygrove App Prototype</h1>
            <p style={{ fontSize: 18, color: tokens.inkMuted, marginTop: 12 }}>US market · $700 device · $2 member pods · Premium wellness brand</p>
          </div>
          <div style={{ display: 'flex', gap: 32, flexWrap: 'wrap', justifyContent: 'center', alignItems: 'flex-start' }}>
            {mainScreens.map((s) => (
              <div key={s.id}>
                <div style={{ fontSize: 13, color: tokens.inkMuted, marginBottom: 8, fontStyle: 'italic', textAlign: 'center' }}>{s.label}</div>
                <AppPhone initial={s.id} />
              </div>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
