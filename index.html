<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maygrove — Complete App Prototype</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f4f2ee; font-family: 'DM Sans', -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // IosFrame — iPhone 15 Pro mockup
    const iosFrameStyles = {
      wrapper: { display: 'inline-block', padding: 12, background: '#000', borderRadius: 60, boxShadow: '0 0 0 2px #1f2937, 0 20px 60px rgba(0,0,0,0.3)', position: 'relative' },
      screen: { position: 'relative', borderRadius: 48, overflow: 'hidden', background: '#FDFBF7' },
      statusBar: { position: 'absolute', top: 0, left: 0, right: 0, height: 54, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 32px 0 32px', fontSize: 16, fontWeight: 600, fontFamily: '-apple-system, "SF Pro Text", sans-serif', zIndex: 20, pointerEvents: 'none' },
      dynamicIsland: { position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)', width: 124, height: 36, background: '#000', borderRadius: 999, zIndex: 30 },
      statusIcons: { display: 'flex', alignItems: 'center', gap: 6 },
      signalIcon: { display: 'flex', alignItems: 'flex-end', gap: 2, height: 12 },
      signalBar: { width: 3, background: 'currentColor', borderRadius: 1 },
      batteryIcon: { width: 26, height: 12, border: '1.5px solid currentColor', borderRadius: 3, padding: 1, position: 'relative', opacity: 0.8 },
      batteryCap: { position: 'absolute', top: 3, right: -3, width: 2, height: 6, background: 'currentColor', borderRadius: '0 1px 1px 0' },
      content: { position: 'absolute', top: 54, left: 0, right: 0, bottom: 34, overflow: 'hidden' },
      homeIndicator: { position: 'absolute', bottom: 10, left: '50%', transform: 'translateX(-50%)', width: 140, height: 5, background: 'rgba(0,0,0,0.3)', borderRadius: 999, zIndex: 10 },
    };

    function IosFrame({ children, width = 393, height = 852, time = '9:41', battery = 100, darkMode = false }) {
      const textColor = darkMode ? '#fff' : '#000';
      return (
        <div style={iosFrameStyles.wrapper}>
          <div style={{ ...iosFrameStyles.screen, width, height, background: darkMode ? '#000' : '#FDFBF7' }}>
            <div style={{ ...iosFrameStyles.statusBar, color: textColor }}>
              <span>{time}</span>
              <div style={iosFrameStyles.statusIcons}>
                <div style={iosFrameStyles.signalIcon}>
                  {[4, 6, 9, 11].map((h, i) => <div key={i} style={{ ...iosFrameStyles.signalBar, height: h }} />)}
                </div>
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style={{ color: textColor }}>
                  <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="currentColor" />
                  <path d="M3 7.5a7 7 0 0110 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" />
                  <path d="M1 4.5a11 11 0 0114 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" opacity="0.7" />
                </svg>
                <div style={iosFrameStyles.batteryIcon}>
                  <div style={{ width: `${battery}%`, height: '100%', background: 'currentColor', borderRadius: 1, opacity: 0.9 }} />
                  <div style={iosFrameStyles.batteryCap} />
                </div>
              </div>
            </div>
            <div style={iosFrameStyles.dynamicIsland} />
            <div style={iosFrameStyles.content}>{children}</div>
            <div style={{ ...iosFrameStyles.homeIndicator, background: darkMode ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.3)' }} />
          </div>
        </div>
      );
    }

    const tokens = {
      bg: '#FDFBF7', sage: '#6E7D65', sageLight: '#E8ECE3', sageDark: '#4A5A46',
      clay: '#B8735F', clayLight: '#F3E6E0', ink: '#1A1A1A', inkMuted: '#6E6E6E',
      cream: '#F4F2EE', white: '#FFFFFF', danger: '#C45B4A', warning: '#D4A03D',
      fontDisplay: '"Playfair Display", serif', fontBody: '"DM Sans", sans-serif',
    };

    const Button = ({ children, variant = 'primary', onClick, style, disabled }) => {
      const base = { padding: '16px 24px', borderRadius: 16, fontWeight: 700, fontSize: 16, border: 'none', cursor: disabled ? 'not-allowed' : 'pointer', width: '100%', opacity: disabled ? 0.5 : 1 };
      const variants = {
        primary: { background: tokens.sage, color: '#fff' },
        secondary: { background: tokens.clayLight, color: tokens.clay },
        outline: { background: 'transparent', color: tokens.sage, border: `1.5px solid ${tokens.sage}` },
        ghost: { background: 'transparent', color: tokens.sage },
      };
      return <button onClick={onClick} disabled={disabled} style={{ ...base, ...variants[variant], ...style }}>{children}</button>;
    };

    const IconButton = ({ icon, onClick, style }) => (
      <button onClick={onClick} style={{ width: 40, height: 40, borderRadius: 12, border: 'none', background: tokens.cream, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20, cursor: 'pointer', ...style }}>{icon}</button>
    );

    const Header = ({ title, left, right, onBack }) => (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 24px', background: tokens.bg }}>
        <div style={{ width: 40 }}>{onBack ? <IconButton icon="←" onClick={onBack} /> : left}</div>
        <div style={{ fontFamily: tokens.fontDisplay, fontSize: 20, fontWeight: 700, color: tokens.ink }}>{title}</div>
        <div style={{ width: 40, textAlign: 'right' }}>{right}</div>
      </div>
    );

    const StatusCard = ({ icon, label, value, sub, color }) => (
      <div style={{ background: tokens.white, borderRadius: 20, padding: 16, flex: 1, boxShadow: '0 1px 3px rgba(0,0,0,0.04)' }}>
        <div style={{ fontSize: 24, marginBottom: 8 }}>{icon}</div>
        <div style={{ fontSize: 13, color: tokens.inkMuted, fontWeight: 500 }}>{label}</div>
        <div style={{ fontSize: 18, fontWeight: 700, color: tokens.ink, marginTop: 4 }}>{value}</div>
        <div style={{ fontSize: 12, color: color || tokens.sage, marginTop: 4 }}>{sub}</div>
      </div>
    );

    const TabBar = ({ active, onTab }) => {
      const items = [
        { id: 'home', icon: '🌿', label: 'Home' },
        { id: 'ai', icon: '✨', label: 'Ask' },
        { id: 'shop', icon: '🛒', label: 'Shop' },
        { id: 'community', icon: '👥', label: 'Community' },
        { id: 'member', icon: '👑', label: 'Member' },
      ];
      return (
        <div style={{ display: 'flex', justifyContent: 'space-around', alignItems: 'center', padding: '10px 0 22px', background: tokens.white, borderTop: '1px solid rgba(0,0,0,0.05)' }}>
          {items.map((item) => (
            <button key={item.id} onClick={() => onTab(item.id)} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, border: 'none', background: 'transparent', cursor: 'pointer' }}>
              <div style={{ fontSize: 22, opacity: active === item.id ? 1 : 0.5 }}>{item.icon}</div>
              <div style={{ fontSize: 10, fontWeight: 700, color: active === item.id ? tokens.sage : tokens.inkMuted }}>{item.label}</div>
            </button>
          ))}
        </div>
      );
    };

    // All screens in one app
    function AppInstance({ initialScreen = 'splash' }) {
      const [screen, setScreen] = React.useState(initialScreen);
      const [prevScreen, setPrevScreen] = React.useState(null);
      const [cart, setCart] = React.useState([]);
      const [orders, setOrders] = React.useState([]);
      const [userName, setUserName] = React.useState('Sarah');
      const [plant, setPlant] = React.useState({ type: 'Butter Lettuce', day: 14, total: 28, health: 98 });
      const [device, setDevice] = React.useState({ name: 'Maygrove-7A2B', connected: true, light: true, pump: true, fan: false });
      const [notifications, setNotifications] = React.useState([{ id: 1, type: 'info', text: 'Your Butter Lettuce is growing strong!', time: '2h ago' }]);
      const [messages, setMessages] = React.useState([
        { role: 'ai', text: 'Hi Sarah! I noticed your Butter Lettuce is on Day 14. Anything you want to know?' }
      ]);
      const [member, setMember] = React.useState({ active: true, saved: 86, pods: 24, nextBox: 'July 15' });
      const [posts, setPosts] = React.useState([
        { id: 1, user: 'Emily R.', avatar: '👩🏼', title: 'First harvest with my kids!', likes: 128, comments: 12, saved: false },
        { id: 2, user: 'Rachel Design', avatar: '👩🏻‍🎨', title: 'Sage green looks perfect in my kitchen', likes: 245, comments: 34, saved: true },
        { id: 3, user: 'Urban Grower', avatar: '👨🏽', title: 'Basil pruning tips for beginners', likes: 89, comments: 8, saved: false },
      ]);
      const [likedPosts, setLikedPosts] = React.useState({});
      const [followed, setFollowed] = React.useState({});

      const navigate = (next) => { setPrevScreen(screen); setScreen(next); };
      const goBack = () => { if (prevScreen) setScreen(prevScreen); };

      const addToCart = (product) => setCart([...cart, product]);
      const removeFromCart = (idx) => setCart(cart.filter((_, i) => i !== idx));
      const cartTotal = cart.reduce((sum, p) => sum + p.price, 0);
      const cartCount = cart.length;

      const products = [
        { id: 'butter', name: 'Butter Lettuce', price: 2, tag: 'Member', desc: 'Crisp, mild, perfect for salads. Grows in 28 days.', color: '#D4E6C3' },
        { id: 'basil', name: 'Sweet Basil', price: 2, tag: 'Member', desc: 'Aromatic Italian basil. Great for pesto and pasta.', color: '#E8ECE3' },
        { id: 'arugula', name: 'Arugula', price: 2, tag: 'Member', desc: 'Peppery greens. Harvest in just 22 days.', color: '#DDE4D5' },
        { id: 'tomato', name: 'Cherry Tomato', price: 3, tag: 'Popular', desc: 'Sweet snack tomatoes. 60 days to first harvest.', color: '#F3E6E0' },
        { id: 'spinach', name: 'Baby Spinach', price: 2, tag: 'Member', desc: 'Tender baby leaves, nutrient dense.', color: '#D4E6C3' },
        { id: 'mint', name: 'Mint', price: 2, tag: 'Member', desc: 'Refreshing herb for drinks and desserts.', color: '#E8ECE3' },
      ];

      const toggleLike = (id) => setLikedPosts({ ...likedPosts, [id]: !likedPosts[id] });
      const toggleFollow = (id) => setFollowed({ ...followed, [id]: !followed[id] });

      const completeHarvest = () => {
        setPlant({ ...plant, day: 0, status: 'harvested' });
        setMessages([...messages, { role: 'ai', text: 'Congratulations on your harvest! 🎉 Time to plant your next crop. May I recommend Sweet Basil?' }]);
      };

      const completeOrder = () => {
        setOrders([...orders, { id: Date.now(), items: cart, total: cartTotal, date: 'Today' }]);
        setCart([]);
        navigate('orderSuccess');
      };

      const renderScreen = () => {
        switch (screen) {
          case 'splash': return <SplashScreen onNext={() => navigate('welcome')} />;
          case 'welcome': return <WelcomeScreen onNext={() => navigate('signup')} />;
          case 'signup': return <SignupScreen name={userName} setName={setUserName} onNext={() => navigate('wifi')} />;
          case 'wifi': return <WifiScreen device={device} onNext={() => navigate('select')} />;
          case 'select': return <SelectScreen plant={plant} setPlant={setPlant} onNext={() => navigate('planting')} />;
          case 'planting': return <PlantingScreen plant={plant} onNext={() => navigate('home')} />;
          case 'home': return <HomeScreen userName={userName} plant={plant} device={device} notifications={notifications} onNav={navigate} onTab={setScreen} />;
          case 'control': return <ControlScreen device={device} setDevice={setDevice} onBack={goBack} />;
          case 'alerts': return <AlertsScreen notifications={notifications} onBack={goBack} />;
          case 'growth': return <GrowthScreen plant={plant} onBack={goBack} onHarvest={() => navigate('harvest')} />;
          case 'harvest': return <HarvestScreen plant={plant} onComplete={completeHarvest} onBack={() => navigate('home')} />;
          case 'ai': return <AIScreen messages={messages} setMessages={setMessages} plant={plant} onNav={navigate} onTab={setScreen} />;
          case 'shop': return <ShopScreen products={products} cartCount={cartCount} onNav={navigate} onTab={setScreen} />;
          case 'product': return <ProductScreen product={products[0]} onAdd={addToCart} onBack={goBack} />;
          case 'cart': return <CartScreen cart={cart} remove={removeFromCart} total={cartTotal} onCheckout={() => navigate('checkout')} onBack={goBack} />;
          case 'checkout': return <CheckoutScreen total={cartTotal} onComplete={completeOrder} onBack={goBack} />;
          case 'orderSuccess': return <OrderSuccessScreen onBack={() => navigate('shop')} />;
          case 'community': return <CommunityScreen posts={posts} likedPosts={likedPosts} followed={followed} toggleLike={toggleLike} toggleFollow={toggleFollow} onNav={navigate} onTab={setScreen} />;
          case 'post': return <PostDetailScreen post={posts[0]} onBack={goBack} />;
          case 'member': return <MemberScreen member={member} onNav={navigate} onTab={setScreen} />;
          case 'profile': return <ProfileScreen userName={userName} plant={plant} member={member} orders={orders} onNav={navigate} onTab={setScreen} />;
          case 'settings': return <SettingsScreen onBack={goBack} />;
          default: return <HomeScreen userName={userName} plant={plant} device={device} notifications={notifications} onNav={navigate} onTab={setScreen} />;
        }
      };

      return <IosFrame>{renderScreen()}</IosFrame>;
    }

    // Screen components
    function SplashScreen({ onNext }) {
      React.useEffect(() => { const t = setTimeout(onNext, 1500); return () => clearTimeout(t); }, [onNext]);
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', background: tokens.sage, color: '#fff' }}>
          <div style={{ fontSize: 80 }}>🌿</div>
          <div style={{ fontFamily: tokens.fontDisplay, fontSize: 42, marginTop: 24 }}>Maygrove</div>
          <div style={{ fontSize: 15, opacity: 0.85, marginTop: 8 }}>Grow better, live greener</div>
        </div>
      );
    }

    function WelcomeScreen({ onNext }) {
      const [step, setStep] = React.useState(0);
      const steps = [
        { title: 'Fresh food, grown by you', body: 'No soil. No green thumb needed. Just pure, living greens on your countertop.', icon: '🥬' },
        { title: 'Smart autopilot growing', body: 'Light, water, and nutrients run automatically. You just add seeds.', icon: '✨' },
        { title: 'Harvest in about 30 days', body: 'From seed to salad. Track every stage in the app.', icon: '🌿' },
      ];
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '32px 24px 24px', background: tokens.bg }}>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', textAlign: 'center' }}>
            <div style={{ width: 200, height: 200, borderRadius: '50%', background: tokens.sageLight, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 80, marginBottom: 32 }}>{steps[step].icon}</div>
            <h1 style={{ fontFamily: tokens.fontDisplay, fontSize: 32, color: tokens.ink, margin: 0 }}>{steps[step].title}</h1>
            <p style={{ fontSize: 16, color: tokens.inkMuted, marginTop: 16, lineHeight: 1.5 }}>{steps[step].body}</p>
          </div>
          <div style={{ display: 'flex', justifyContent: 'center', gap: 8, marginBottom: 24 }}>
            {steps.map((_, i) => <div key={i} style={{ width: 8, height: 8, borderRadius: 4, background: i === step ? tokens.sage : '#D8D4CC' }} />)}
          </div>
          <Button onClick={() => step < steps.length - 1 ? setStep(step + 1) : onNext()}>Continue</Button>
        </div>
      );
    }

    function SignupScreen({ name, setName, onNext }) {
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '24px', background: tokens.bg }}>
          <div style={{ fontFamily: tokens.fontDisplay, fontSize: 28, color: tokens.ink, marginTop: 40 }}>Create your garden</div>
          <p style={{ fontSize: 15, color: tokens.inkMuted, marginTop: 8 }}>What should we call you?</p>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="Your first name" style={{ marginTop: 32, padding: 16, borderRadius: 16, border: '1px solid #E0DDD6', fontSize: 16, outline: 'none', background: tokens.white }} />
          <div style={{ marginTop: 24, display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, background: tokens.white, borderRadius: 16, padding: 16 }}>
              <div style={{ fontSize: 24 }}>🌱</div>
              <div><div style={{ fontWeight: 700, fontSize: 15 }}>I'm new to growing</div><div style={{ fontSize: 13, color: tokens.inkMuted }}>Show me the basics</div></div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, background: tokens.sageLight, borderRadius: 16, padding: 16, border: `2px solid ${tokens.sage}` }}>
              <div style={{ fontSize: 24 }}>🌿</div>
              <div><div style={{ fontWeight: 700, fontSize: 15 }}>I've grown before</div><div style={{ fontSize: 13, color: tokens.inkMuted }}>Skip the basics</div></div>
            </div>
          </div>
          <div style={{ marginTop: 'auto' }}>
            <Button onClick={onNext} disabled={!name.trim()}>Get Started</Button>
          </div>
        </div>
      );
    }

    function WifiScreen({ device, onNext }) {
      const [connecting, setConnecting] = React.useState(false);
      const [connected, setConnected] = React.useState(false);
      const connect = () => { setConnecting(true); setTimeout(() => { setConnecting(false); setConnected(true); setTimeout(onNext, 800); }, 2000); };
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '24px', background: tokens.bg }}>
          <div style={{ fontFamily: tokens.fontDisplay, fontSize: 28, color: tokens.ink }}>Connect your Maygrove</div>
          <p style={{ fontSize: 15, color: tokens.inkMuted, marginTop: 8 }}>Plug in your device and connect to Wi-Fi.</p>
          <div style={{ background: tokens.white, borderRadius: 20, padding: 20, marginTop: 24, boxShadow: '0 1px 3px rgba(0,0,0,0.04)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ width: 48, height: 48, borderRadius: 14, background: tokens.sageLight, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24 }}>📶</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 15, color: tokens.ink }}>{device.name}</div>
                <div style={{ fontSize: 13, color: connected ? tokens.sage : tokens.inkMuted }}>{connected ? 'Connected' : 'Ready to pair'}</div>
              </div>
              <div style={{ width: 12, height: 12, borderRadius: 6, background: connected ? tokens.sage : '#D8D4CC' }} />
            </div>
          </div>
          <div style={{ marginTop: 24 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: tokens.inkMuted, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Wi-Fi Network</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, background: tokens.white, borderRadius: 16, padding: 16 }}>
              <div style={{ fontSize: 20 }}>📡</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 15 }}>Home Network 5G</div>
                <div style={{ fontSize: 13, color: tokens.inkMuted }}>Connected</div>
              </div>
              <div style={{ fontSize: 13, color: tokens.sage, fontWeight: 700 }}>Change</div>
            </div>
          </div>
          <div style={{ marginTop: 'auto' }}>
            <Button onClick={connect} disabled={connecting}>{connecting ? 'Connecting...' : connected ? 'Continue' : 'Connect to Wi-Fi'}</Button>
          </div>
        </div>
      );
    }

    function SelectScreen({ plant, setPlant, onNext }) {
      const pods = [
        { type: 'Butter Lettuce', total: 28, desc: 'Crisp, mild. Great for beginners.', color: '#D4E6C3' },
        { type: 'Sweet Basil', total: 25, desc: 'Aromatic Italian herb.', color: '#E8ECE3' },
        { type: 'Arugula', total: 22, desc: 'Peppery, fast-growing greens.', color: '#DDE4D5' },
      ];
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '24px', background: tokens.bg }}>
          <div style={{ fontFamily: tokens.fontDisplay, fontSize: 28, color: tokens.ink }}>What should you grow first?</div>
          <p style={{ fontSize: 15, color: tokens.inkMuted, marginTop: 8 }}>AI recommends based on your season and experience.</p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginTop: 24 }}>
            {pods.map((pod) => (
              <div key={pod.type} onClick={() => setPlant({ ...plant, type: pod.type, total: pod.total })} style={{ cursor: 'pointer', border: plant.type === pod.type ? `2px solid ${tokens.sage}` : '2px solid transparent', borderRadius: 18 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 14, background: tokens.white, borderRadius: 18, padding: 16 }}>
                  <div style={{ width: 56, height: 56, borderRadius: 16, background: pod.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 28 }}>🌱</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 16, color: tokens.ink }}>{pod.type}</div>
                    <div style={{ fontSize: 13, color: tokens.inkMuted, marginTop: 2 }}>{pod.desc}</div>
                    <div style={{ fontSize: 13, color: tokens.sage, marginTop: 4, fontWeight: 700 }}>{pod.total} days to harvest</div>
                  </div>
                  {plant.type === pod.type && <div style={{ fontSize: 24, color: tokens.sage }}>✓</div>}
                </div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 'auto' }}>
            <Button onClick={onNext}>Plant {plant.type}</Button>
          </div>
        </div>
      );
    }

    function PlantingScreen({ plant, onNext }) {
      const [step, setStep] = React.useState(0);
      const steps = [
        { title: 'Fill the water tank', desc: 'Add water up to the fill line.', icon: '💧' },
        { title: 'Insert seed pods', desc: `Place your ${plant.type} pods into the slots.`, icon: '🌱' },
        { title: 'Plug in & turn on', desc: 'Maygrove will handle the rest.', icon: '⚡' },
      ];
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '24px', background: tokens.bg }}>
          <div style={{ fontFamily: tokens.fontDisplay, fontSize: 28, color: tokens.ink }}>Let's plant</div>
          <p style={{ fontSize: 15, color: tokens.inkMuted, marginTop: 8 }}>Follow the steps below.</p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16, marginTop: 24 }}>
            {steps.map((s, i) => (
              <div key={i} onClick={() => setStep(Math.max(step, i + 1))} style={{ display: 'flex', alignItems: 'center', gap: 14, background: step > i ? tokens.sageLight : tokens.white, borderRadius: 18, padding: 16, cursor: 'pointer' }}>
                <div style={{ width: 48, height: 48, borderRadius: 14, background: step > i ? tokens.sage : '#E0DDD6', color: step > i ? '#fff' : tokens.ink, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>{step > i ? '✓' : s.icon}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 15, color: tokens.ink }}>{s.title}</div>
                  <div style={{ fontSize: 13, color: tokens.inkMuted, marginTop: 2 }}>{s.desc}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 'auto' }}>
